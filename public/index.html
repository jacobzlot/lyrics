<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lyrics Translator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0d0d0f;
    color: #e8e8e8;
    min-height: 100vh;
  }

  header {
    padding: 28px 40px;
    border-bottom: 1px solid #1e1e24;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.3px; }
  header .pill {
    background: #1db954;
    color: #000;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 73px);
  }

  /* ── LEFT PANEL ── */
  .sidebar {
    border-right: 1px solid #1e1e24;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid #1e1e24;
  }
  .sidebar-tabs button {
    padding: 14px;
    background: none;
    border: none;
    color: #777;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    border-bottom: 2px solid transparent;
  }
  .sidebar-tabs button.active {
    color: #e8e8e8;
    border-bottom-color: #1db954;
  }

  .tab-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .tab-panel.active { display: flex; }

  /* Search tab */
  .search-box {
    padding: 16px;
    border-bottom: 1px solid #1e1e24;
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: #17171c;
    border: 1px solid #2a2a32;
    border-radius: 8px;
    color: #e8e8e8;
    font-size: 0.88rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box input:focus { border-color: #444; }

  #autocomplete {
    position: absolute;
    top: calc(100% - 8px);
    left: 16px; right: 16px;
    background: #1a1a21;
    border: 1px solid #2a2a32;
    border-radius: 8px;
    z-index: 100;
    overflow: hidden;
  }
  .ac-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .ac-item:hover { background: #232329; }
  .ac-item img { width: 36px; height: 36px; border-radius: 4px; object-fit: cover; }
  .ac-item .ac-thumb-placeholder { width: 36px; height: 36px; border-radius: 4px; background: #2a2a32; flex-shrink: 0; }
  .ac-item .ac-text { flex: 1; min-width: 0; }
  .ac-item .ac-title { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ac-item .ac-artist { font-size: 0.75rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Playlist tab */
  .playlist-input { padding: 16px; border-bottom: 1px solid #1e1e24; }
  .playlist-input input {
    width: 100%;
    background: #17171c;
    border: 1px solid #2a2a32;
    border-radius: 8px 8px 0 0;
    color: #e8e8e8;
    font-size: 0.82rem;
    padding: 10px 14px;
    outline: none;
  }
  .playlist-input button {
    width: 100%;
    background: #1db954;
    border: none;
    border-radius: 0 0 8px 8px;
    color: #000;
    font-size: 0.82rem;
    font-weight: 700;
    padding: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .playlist-input button:hover { background: #1ed760; }
  .playlist-input button:disabled { background: #333; color: #666; cursor: not-allowed; }

  .track-list { flex: 1; overflow-y: auto; }
  .track-list::-webkit-scrollbar { width: 4px; }
  .track-list::-webkit-scrollbar-track { background: transparent; }
  .track-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .track-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid #16161c;
  }
  .track-item:hover { background: #17171c; }
  .track-item.selected { background: #1a2820; }
  .track-item img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
  .track-item .t-placeholder { width: 40px; height: 40px; border-radius: 4px; background: #2a2a32; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
  .track-item .t-info { flex: 1; min-width: 0; }
  .track-item .t-title { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-item .t-artist { font-size: 0.75rem; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── RIGHT PANEL ── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid #1e1e24;
  }
  .song-info { flex: 1; }
  .song-info .s-title { font-size: 1rem; font-weight: 600; }
  .song-info .s-artist { font-size: 0.8rem; color: #888; margin-top: 2px; }

  #lang-select {
    background: #17171c;
    border: 1px solid #2a2a32;
    border-radius: 8px;
    color: #e8e8e8;
    font-size: 0.82rem;
    padding: 8px 12px;
    outline: none;
    cursor: pointer;
  }

  #translate-btn {
    background: #1db954;
    border: none;
    border-radius: 8px;
    color: #000;
    font-size: 0.82rem;
    font-weight: 700;
    padding: 8px 18px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  #translate-btn:hover { background: #1ed760; }
  #translate-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

  .lyrics-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  .lyrics-area::-webkit-scrollbar { width: 4px; }
  .lyrics-area::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #444;
    gap: 12px;
    text-align: center;
  }
  .empty-state .icon { font-size: 3rem; }
  .empty-state p { font-size: 0.9rem; }

  .lyrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .lyrics-col-header {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    padding-bottom: 16px;
  }
  .lyric-row {
    display: contents;
  }
  .lyric-row .orig,
  .lyric-row .trans {
    padding: 5px 12px 5px 0;
    font-size: 0.9rem;
    line-height: 1.6;
    border-bottom: 1px solid #13131a;
  }
  .lyric-row .trans { padding-left: 20px; border-left: 1px solid #1e1e24; color: #b0c4b0; }
  .lyric-row.blank .orig,
  .lyric-row.blank .trans { padding: 8px 0; border-bottom: none; }

  .cache-badge {
    font-size: 0.65rem;
    background: #1a2820;
    color: #1db954;
    border: 1px solid #1db954;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 600;
  }

  .status-bar {
    padding: 10px 24px;
    border-top: 1px solid #1e1e24;
    font-size: 0.75rem;
    color: #555;
    min-height: 38px;
  }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid #333;
    border-top-color: #1db954;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>🎵 Lyrics Translator</h1>
  <span class="pill">AI Powered</span>
</header>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="active" onclick="switchTab('search', this)">Search</button>
      <button onclick="switchTab('playlist', this)">Playlist</button>
    </div>

    <!-- SEARCH TAB -->
    <div class="tab-panel active" id="tab-search">
      <div class="search-box">
        <input id="search-input" type="text" placeholder="Search for a song…" autocomplete="off" />
        <div id="autocomplete"></div>
      </div>
    </div>

    <!-- PLAYLIST TAB -->
    <div class="tab-panel" id="tab-playlist">
      <div class="playlist-input">
        <input id="playlist-url" type="text" placeholder="Paste Spotify or Apple Music playlist URL…" />
        <button id="import-btn" onclick="importPlaylist()">Import Playlist</button>
      </div>
      <div class="track-list" id="track-list">
        <div style="padding:24px;color:#555;font-size:0.82rem;text-align:center;">
          Paste a public playlist URL above
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="main-toolbar">
      <div class="song-info">
        <div class="s-title" id="song-title">No song selected</div>
        <div class="s-artist" id="song-artist">—</div>
      </div>
      <span id="cache-indicator"></span>
      <select id="lang-select">
        <option value="English">English</option>
        <option value="Spanish">Spanish</option>
        <option value="French">French</option>
        <option value="Portuguese">Portuguese</option>
        <option value="Italian">Italian</option>
        <option value="German">German</option>
        <option value="Japanese">Japanese</option>
        <option value="Korean">Korean</option>
        <option value="Chinese (Simplified)">Chinese (Simplified)</option>
        <option value="Arabic">Arabic</option>
        <option value="Russian">Russian</option>
        <option value="Hindi">Hindi</option>
        <option value="Dutch">Dutch</option>
        <option value="Polish">Polish</option>
        <option value="Turkish">Turkish</option>
      </select>
      <button id="translate-btn" onclick="translate()" disabled>Translate</button>
    </div>

    <div class="lyrics-area" id="lyrics-area">
      <div class="empty-state">
        <div class="icon">🎶</div>
        <p>Search for a song or import a playlist<br>to get started</p>
      </div>
    </div>

    <div class="status-bar" id="status-bar"></div>
  </div>
</div>

<script>
let currentArtist = '', currentTitle = '', currentLyrics = '', searchTimer;

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sidebar-tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── SEARCH AUTOCOMPLETE ───────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { document.getElementById('autocomplete').innerHTML = ''; return; }
  searchTimer = setTimeout(() => doSearch(q), 280);
});

async function doSearch(q) {
  const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
  const hits = await res.json();
  const ac = document.getElementById('autocomplete');
  if (!hits.length) { ac.innerHTML = ''; return; }
  ac.innerHTML = hits.map(h => `
    <div class="ac-item" onclick="selectSong('${esc(h.artist)}','${esc(h.title)}')">
      ${h.thumbnail ? `<img src="${h.thumbnail}" />` : '<div class="ac-thumb-placeholder"></div>'}
      <div class="ac-text">
        <div class="ac-title">${h.title}</div>
        <div class="ac-artist">${h.artist}</div>
      </div>
    </div>
  `).join('');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-box')) document.getElementById('autocomplete').innerHTML = '';
});

// ── SELECT SONG ───────────────────────────────────────────────────────────────
async function selectSong(artist, title) {
  document.getElementById('autocomplete').innerHTML = '';
  document.getElementById('search-input').value = `${title} — ${artist}`;
  document.getElementById('song-title').textContent = title;
  document.getElementById('song-artist').textContent = artist;
  document.getElementById('cache-indicator').innerHTML = '';
  currentArtist = artist; currentTitle = title; currentLyrics = '';
  document.getElementById('translate-btn').disabled = true;

  setStatus('<span class="spinner"></span>Fetching lyrics…');
  showEmptyState('⏳', 'Loading lyrics…');

  const res = await fetch(`/api/lyrics?artist=${encodeURIComponent(artist)}&title=${encodeURIComponent(title)}`);
  const data = await res.json();

  if (data.error) { setStatus('⚠️ ' + data.error); showEmptyState('😕', data.error); return; }

  currentLyrics = data.lyrics;
  document.getElementById('translate-btn').disabled = false;

  // Show original lyrics
  const area = document.getElementById('lyrics-area');
  area.innerHTML = `
    <div style="max-width:480px">
      <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#555;margin-bottom:16px">Original Lyrics</div>
      ${data.lyrics.split('\n').map(l => `<div style="font-size:0.9rem;line-height:1.8;color:#ccc;min-height:1.4em">${l || '&nbsp;'}</div>`).join('')}
    </div>
  `;
  setStatus(data.fromCache ? '✅ Lyrics loaded from cache' : '✅ Lyrics loaded');
}

// ── TRANSLATE ─────────────────────────────────────────────────────────────────
async function translate() {
  if (!currentLyrics) return;
  const lang = document.getElementById('lang-select').value;
  document.getElementById('translate-btn').disabled = true;
  setStatus('<span class="spinner"></span>Translating…');

  const res = await fetch('/api/translate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ lyrics: currentLyrics, targetLanguage: lang, artist: currentArtist, title: currentTitle })
  });
  const data = await res.json();
  document.getElementById('translate-btn').disabled = false;

  if (data.error) { setStatus('⚠️ ' + data.error); return; }

  document.getElementById('cache-indicator').innerHTML =
    data.fromCache ? '<span class="cache-badge">⚡ Cached</span>' : '';

  const area = document.getElementById('lyrics-area');
  area.innerHTML = `
    <div class="lyrics-grid">
      <div class="lyrics-col-header">Original · ${data.sourceLanguage}</div>
      <div class="lyrics-col-header" style="padding-left:20px">${lang}</div>
      ${data.lines.map(l => `
        <div class="lyric-row ${!l.original ? 'blank' : ''}">
          <div class="orig">${l.original || ''}</div>
          <div class="trans">${l.translated || ''}</div>
        </div>
      `).join('')}
    </div>
  `;
  setStatus(data.fromCache ? '⚡ Translation loaded from cache — no GPT call made' : `✅ Translated from ${data.sourceLanguage} to ${lang}`);
}

// ── PLAYLIST IMPORT ───────────────────────────────────────────────────────────
async function importPlaylist() {
  const url = document.getElementById('playlist-url').value.trim();
  if (!url) return;

  const isSpotify = url.includes('spotify.com');
  const isApple = url.includes('music.apple.com');
  if (!isSpotify && !isApple) {
    alert('Please paste a Spotify or Apple Music playlist URL.');
    return;
  }

  const btn = document.getElementById('import-btn');
  btn.disabled = true;
  btn.textContent = 'Loading…';
  document.getElementById('track-list').innerHTML = '<div style="padding:24px;color:#555;font-size:0.82rem;text-align:center"><span class="spinner"></span>Fetching playlist…</div>';

  const endpoint = isSpotify ? '/api/playlist/spotify' : '/api/playlist/apple';
  const res = await fetch(`${endpoint}?url=${encodeURIComponent(url)}`);
  const data = await res.json();

  btn.disabled = false;
  btn.textContent = 'Import Playlist';

  if (data.error) {
    document.getElementById('track-list').innerHTML = `<div style="padding:24px;color:#e05;font-size:0.82rem;text-align:center">${data.error}</div>`;
    return;
  }

  const list = document.getElementById('track-list');
  list.innerHTML = data.tracks.map((t, i) => `
    <div class="track-item" id="track-${i}" onclick="selectTrack(${i}, '${esc(t.artist)}', '${esc(t.title)}', this)">
      ${t.thumbnail ? `<img src="${t.thumbnail}" />` : `<div class="t-placeholder">🎵</div>`}
      <div class="t-info">
        <div class="t-title">${t.title}</div>
        <div class="t-artist">${t.artist}</div>
      </div>
    </div>
  `).join('');
}

function selectTrack(i, artist, title, el) {
  document.querySelectorAll('.track-item').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  selectSong(artist, title);
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(str) { return (str || '').replace(/\\/g,'\\\\').replace(/'/g, "\\'"); }
function setStatus(html) { document.getElementById('status-bar').innerHTML = html; }
function showEmptyState(icon, msg) {
  document.getElementById('lyrics-area').innerHTML = `
    <div class="empty-state"><div class="icon">${icon}</div><p>${msg}</p></div>
  `;
}
</script>
</body>
</html>
